name: "Formativa - DevSecOps Security Pipeline"

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  testes-unitarios:
    name: Executar testes unitários
    runs-on: self-hosted

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Verificar PHP
        run: php -v

      - name: Instalar dependências
        run: composer install --no-interaction --prefer-dist

      - name: Rodar PHPUnit
        run: ./vendor/bin/phpunit

  sast-semgrep:
    name: SAST - Semgrep
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Instalar Semgrep
        run: python3 -m pip install --upgrade semgrep

      - name: Preparar pasta de relatórios
        run: mkdir -p reports

      - name: Rodar Semgrep com regras padrão e regra customizada
        continue-on-error: true
        run: |
          semgrep scan \
            --config auto \
            --config semgrep/rules \
            --json \
            --output reports/semgrep-results.json \
            .

      - name: Gerar resumo legível da regra customizada
        continue-on-error: true
        run: |
          semgrep scan \
            --config semgrep/rules/no-debug-output.yml \
            . | tee reports/semgrep-custom-rule.txt

      - name: Publicar relatórios do Semgrep
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-reports
          path: |
            reports/semgrep-results.json
            reports/semgrep-custom-rule.txt

  sca-fossa:
    name: SCA - FOSSA
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Preparar pasta de relatórios
        run: mkdir -p reports

      - name: Rodar análise SCA com FOSSA
        id: fossa
        uses: fossas/fossa-action@v1.9.0
        with:
          api-key: ${{ secrets.FOSSA_API_KEY }}
          project: devsecops-projeto-final-2026
          generate-report: html

      - name: Salvar relatório HTML do FOSSA
        if: always()
        env:
          FOSSA_REPORT: ${{ steps.fossa.outputs.report }}
        run: |
          if [ -n "$FOSSA_REPORT" ]; then
            printf '%s' "$FOSSA_REPORT" > reports/fossa-attribution.html
          else
            echo "Relatório HTML não foi retornado pela FOSSA Action." > reports/fossa-attribution.html
          fi

      - name: Publicar relatório do FOSSA
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fossa-reports
          path: reports/fossa-attribution.html