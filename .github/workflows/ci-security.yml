name: ci-security

on:
  push:
    branches: [ "main" ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  php-lint:
    name: PHP lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          coverage: none

      - name: Lint PHP files
        run: |
          find auth-service task-service gateway tests -type f -name "*.php" -print0 | xargs -0 -n1 php -l

  phpunit:
    name: PHPUnit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          coverage: none

      - name: Validate composer files
        run: composer validate --no-check-publish

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Run PHPUnit
        run: php vendor/bin/phpunit --testdox --display-all-issues

  semgrep:
    name: Semgrep
    runs-on: ubuntu-latest
    env:
      SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Semgrep
        run: python -m pip install --upgrade pip semgrep

      - name: Run Semgrep CI
        run: semgrep ci

  snyk-open-source:
    name: Snyk Open Source
    runs-on: ubuntu-latest
    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install Snyk CLI
        run: npm install -g snyk

      - name: Run Snyk Open Source
        shell: bash
        run: |
          mkdir -p reports
          echo '{}' > reports/snyk-open-source.json
          snyk test --all-projects --detection-depth=6 --severity-threshold=high --json-file-output=reports/snyk-open-source.json > reports/snyk-open-source.log 2>&1
          status=$?
          cat reports/snyk-open-source.log
          echo "Snyk Open Source exit code: $status"
          exit $status

      - name: Upload Snyk Open Source artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: snyk-open-source-report
          path: |
            reports/snyk-open-source.log
            reports/snyk-open-source.json
          if-no-files-found: ignore
      
      - name: Confirm Snyk Open Source success
        run: |
          test -f reports/snyk-open-source.log
          echo "Snyk Open Source final status: success"

  snyk-code:
    name: Snyk Code
    runs-on: ubuntu-latest
    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install Snyk CLI
        run: npm install -g snyk

      - name: Run Snyk Code
        shell: bash
        run: |
          mkdir -p reports
          echo '{}' > reports/snyk-code.json
          snyk code test --severity-threshold=high --json-file-output=reports/snyk-code.json > reports/snyk-code.log 2>&1
          status=$?
          cat reports/snyk-code.log
          echo "Snyk Code exit code: $status"
          exit $status

      - name: Confirm Snyk Code success
        run: |
          test -f reports/snyk-code.log
          echo "Snyk Code final status: success"

      - name: Upload Snyk Code artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: snyk-code-report
          path: |
            reports/snyk-code.log
            reports/snyk-code.json
          if-no-files-found: ignore

  fossa:
    name: FOSSA
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run FOSSA analyze
        uses: fossas/fossa-action@main
        with:
          api-key: ${{ secrets.FOSSA_API_KEY }}

      - name: Run FOSSA test
        uses: fossas/fossa-action@main
        with:
          api-key: ${{ secrets.FOSSA_API_KEY }}
          run-tests: true