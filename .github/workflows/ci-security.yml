name: ci-security

on:
  push:
    branches: [ "main" ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  php-lint:
    name: PHP lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          coverage: none

      - name: Lint PHP files
        run: |
          find auth-service task-service gateway tests -type f -name "*.php" -print0 | xargs -0 -n1 php -l

  phpunit:
    name: PHPUnit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          coverage: none

      - name: Validate composer files
        run: composer validate --no-check-publish

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Run PHPUnit
        run: php vendor/bin/phpunit --testdox --display-all-issues

  semgrep:
    name: Semgrep
    runs-on: ubuntu-latest
    env:
      SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Semgrep
        run: python -m pip install --upgrade pip semgrep

      - name: Run Semgrep CI
        run: semgrep ci

  snyk-open-source:
    name: Snyk Open Source
    runs-on: ubuntu-latest
    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Snyk CLI
        run: npm install -g snyk

      - name: Run Snyk Open Source
        run: snyk test --severity-threshold=high --json-file-output=snyk-open-source.json

      - name: Upload Snyk Open Source artifact
        uses: actions/upload-artifact@v4
        with:
          name: snyk-open-source-report
          path: snyk-open-source.json
          if-no-files-found: warn

  snyk-code:
    name: Snyk Code
    runs-on: ubuntu-latest
    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Snyk CLI
        run: npm install -g snyk

      - name: Run Snyk Code
        run: snyk code test --severity-threshold=high --json-file-output=snyk-code.json

      - name: Upload Snyk Code artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: snyk-code-report
          path: snyk-code.json
          if-no-files-found: warn

  fossa:
    name: FOSSA
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run FOSSA analyze
        uses: fossas/fossa-action@main
        with:
          api-key: ${{ secrets.FOSSA_API_KEY }}

      - name: Run FOSSA test
        uses: fossas/fossa-action@main
        with:
          api-key: ${{ secrets.FOSSA_API_KEY }}
          run-tests: true