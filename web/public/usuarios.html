<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Usuários - StudyBoard</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body data-admin-page="true">
  <div class="container">
    <div class="nav">
      <h1>Usuários</h1>
      <div class="nav-links">
        <a class="button secondary" href="/">Início</a>
        <a class="button secondary" href="/perfil">Perfil</a>
        <a class="button secondary" href="/tarefas">Tarefas</a>
        <span id="admin-links"></span>
        <button class="danger" data-logout>Logout</button>
      </div>
    </div>

    <div class="card">
      <h2>Listagem de usuários</h2>
      <div id="users-message" class="alert hidden"></div>

      <form id="users-filter-form" class="filters-grid" autocomplete="off">
        <label for="users-role-filter">
          Perfil
          <select id="users-role-filter" name="role">
            <option value="">Todos os perfis</option>
            <option value="admin">Administradores</option>
            <option value="user">Usuários comuns</option>
          </select>
        </label>

        <div class="filter-actions">
          <button type="submit" class="button">Filtrar</button>
          <button type="button" class="button secondary" id="users-filter-clear">Limpar</button>
        </div>
      </form>

      <div id="users-list" class="task-list"></div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/usuarios.js"></script>
</body>
</html>
