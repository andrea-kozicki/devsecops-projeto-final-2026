<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tarefas - StudyBoard</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="container">
    <div class="nav">
      <h1>Tarefas</h1>
      <div class="nav-links">
        <a class="button secondary" href="/">Início</a>
        <a class="button secondary" href="/perfil">Perfil</a>
        <button class="danger" data-logout>Logout</button>
      </div>
    </div>

    <div class="card">
      <h2>Nova tarefa</h2>

      <form id="task-form" class="form-grid">
        <div>
          <label for="task-title">Título</label>
          <input id="task-title" type="text" required>
        </div>

        <div>
          <label for="task-description">Descrição</label>
          <textarea id="task-description"></textarea>
        </div>

        <div class="row">
          <div>
            <label for="task-priority">Prioridade</label>
            <select id="task-priority">
              <option value="baixa">Baixa</option>
              <option value="media" selected>Média</option>
              <option value="alta">Alta</option>
            </select>
          </div>

          <div>
            <label for="task-status">Status</label>
            <select id="task-status">
              <option value="pendente" selected>Pendente</option>
              <option value="em_andamento">Em andamento</option>
              <option value="concluida">Concluída</option>
            </select>
          </div>
        </div>

        <div>
          <label for="task-due-date">Prazo</label>
          <input id="task-due-date" type="date">
        </div>

        <button type="submit">Criar tarefa</button>
      </form>

      <div id="task-message" class="alert hidden"></div>
    </div>

    <div class="card" style="margin-top: 18px;">
      <h2>Filtros</h2>

      <form id="task-filters" class="row">
        <div>
          <label for="filter-status">Status</label>
          <select id="filter-status">
            <option value="">Todos</option>
            <option value="pendente">Pendente</option>
            <option value="em_andamento">Em andamento</option>
            <option value="concluida">Concluída</option>
          </select>
        </div>

        <div>
          <label for="filter-priority">Prioridade</label>
          <select id="filter-priority">
            <option value="">Todas</option>
            <option value="baixa">Baixa</option>
            <option value="media">Média</option>
            <option value="alta">Alta</option>
          </select>
        </div>
      </form>

      <div class="nav-links" style="margin-top: 14px;">
        <button id="refresh-tasks" type="button">Atualizar lista</button>
      </div>

      <div id="task-list-message" class="alert hidden"></div>
      <div id="task-list" class="task-list"></div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/tarefas.js"></script>
</body>
</html>
