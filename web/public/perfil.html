<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perfil - StudyBoard</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="container">
    <div class="nav">
      <h1>Perfil</h1>
      <div class="nav-links">
        <a class="button secondary" href="/">Início</a>
        <a class="button secondary" href="/tarefas">Tarefas</a>
        <span id="admin-links"></span>
        <button class="danger" data-logout>Logout</button>
      </div>
    </div>

    <div class="card">
      <h2>Editar perfil</h2>

      <form id="profile-form" class="form-grid">
        <div>
          <label for="profile-name">Nome</label>
          <input id="profile-name" type="text" required>
        </div>

        <div>
          <label for="profile-email">E-mail</label>
          <input id="profile-email" type="email" required>
        </div>

        <div>
          <label for="profile-password">Nova senha</label>
          <input id="profile-password" type="password" placeholder="Deixe em branco para não alterar">
        </div>

        <button type="submit">Salvar perfil</button>
      </form>

      <div id="profile-message" class="alert hidden"></div>
    </div>

    <div class="card" style="margin-top: 18px;">
      <h2>Dados atuais</h2>
      <div id="profile-summary">
        <p class="muted">Carregando perfil...</p>
      </div>
    </div>

    <div class="card mfa-card" style="margin-top: 22px;">
      <h2>MFA</h2>
      <p class="muted">Proteja sua conta com autenticação em dois fatores.</p>

      <div class="mfa-status-row">
        <span class="mfa-status-label">Status:</span>
        <span id="mfa-status-badge" class="badge badge-danger">Desabilitado</span>
      </div>

      <div id="mfa-status" class="muted">Carregando status MFA...</div>

      <div id="mfa-setup-result" class="mfa-setup-box hidden"></div>

      <div class="mfa-actions-row">
        <button type="button" id="mfa-setup-btn">Iniciar configuração MFA</button>
      </div>

      <div class="mfa-code-block">
        <label for="mfa-code">Código MFA</label>
        <input
          id="mfa-code"
          type="text"
          inputmode="numeric"
          maxlength="6"
          placeholder="Digite o código de 6 dígitos"
          autocomplete="one-time-code"
        >
      </div>

      <div class="mfa-actions-row">
        <button type="button" id="mfa-enable-btn" class="secondary">Habilitar MFA</button>
        <button type="button" id="mfa-disable-btn" class="danger">Desabilitar MFA</button>
      </div>

      <div id="mfa-message" class="alert hidden"></div>
    </div>

  </div>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/perfil.js"></script>
</body>
</html>
