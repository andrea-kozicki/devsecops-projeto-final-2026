<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Auditoria - StudyBoard</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body data-admin-page="true">
  <div class="container">
    <div class="nav">
      <h1>Auditoria</h1>
      <div class="nav-links">
        <a class="button secondary" href="/">Início</a>
        <a class="button secondary" href="/usuarios">Usuários</a>
        <a class="button secondary" href="/perfil">Perfil</a>
        <span id="admin-links"></span>
        <button class="danger" data-logout>Logout</button>
      </div>
    </div>

    <div class="card">
      <h2>Eventos recentes</h2>

      <form id="audit-filter-form" class="audit-filters">
        <div class="form-group">
          <label for="audit-date-from">Data inicial</label>
          <input id="audit-date-from" name="date_from" type="date">
        </div>

        <div class="form-group">
          <label for="audit-date-to">Data final</label>
          <input id="audit-date-to" name="date_to" type="date">
        </div>

        <div class="form-group">
          <label for="audit-user-filter">Usuário</label>
          <select id="audit-user-filter" name="user_id">
            <option value="">Todos os usuários</option>
          </select>
        </div>

        <div class="filter-actions">
          <button type="submit" class="button">Filtrar</button>
          <button type="button" id="audit-filter-clear" class="button secondary">Limpar</button>
        </div>
      </form>

      <div id="audit-message" class="alert hidden"></div>
      <div id="audit-list" class="task-list"></div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/auditoria.js"></script>
</body>
</html>
