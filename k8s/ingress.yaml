apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: studyboard-ingress
  namespace: studyboard
  labels:
    app.kubernetes.io/name: studyboard
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - studyboard.local
      secretName: studyboard-tls
  rules:
    - host: studyboard.local
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: gateway
                port:
                  number: 80
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web
                port:
                  number: 80
