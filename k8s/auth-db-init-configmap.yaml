apiVersion: v1
kind: ConfigMap
metadata:
  name: auth-db-init
  namespace: studyboard
  labels:
    app.kubernetes.io/name: studyboard
    app.kubernetes.io/component: auth-db
data:
  01-auth-schema.sql: |
    CREATE DATABASE IF NOT EXISTS studyboard_auth
      CHARACTER SET utf8mb4
      COLLATE utf8mb4_unicode_ci;

    USE studyboard_auth;

    CREATE TABLE IF NOT EXISTS users (
        id INT UNSIGNED AUTO_INCREMENT PRIMARY KEY,
        name VARCHAR(120) NOT NULL,
        email VARCHAR(150) NOT NULL,
        password_hash VARCHAR(255) NOT NULL,
        role ENUM('user', 'admin') NOT NULL DEFAULT 'user',
        is_active TINYINT(1) NOT NULL DEFAULT 1,
        created_at TIMESTAMP NOT NULL DEFAULT CURRENT_TIMESTAMP,
        updated_at TIMESTAMP NOT NULL DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP,
        CONSTRAINT uq_users_email UNIQUE (email)
    ) ENGINE=InnoDB;

    CREATE TABLE IF NOT EXISTS auth_tokens (
        id BIGINT UNSIGNED AUTO_INCREMENT PRIMARY KEY,
        user_id INT UNSIGNED NOT NULL,
        token_hash CHAR(64) NOT NULL,
        expires_at DATETIME NOT NULL,
        revoked TINYINT(1) NOT NULL DEFAULT 0,
        created_at TIMESTAMP NOT NULL DEFAULT CURRENT_TIMESTAMP,
        last_used_at DATETIME NULL,
        CONSTRAINT fk_auth_tokens_user
            FOREIGN KEY (user_id) REFERENCES users(id)
            ON DELETE CASCADE
            ON UPDATE CASCADE,
        CONSTRAINT uq_auth_tokens_hash UNIQUE (token_hash)
    ) ENGINE=InnoDB;

    CREATE TABLE IF NOT EXISTS login_attempts (
        id INT UNSIGNED AUTO_INCREMENT PRIMARY KEY,
        email VARCHAR(150) NOT NULL,
        ip_address VARCHAR(45) NOT NULL,
        attempted_at DATETIME NOT NULL DEFAULT CURRENT_TIMESTAMP,
        INDEX idx_login_attempts_email_ip_time (email, ip_address, attempted_at)
    );

    CREATE TABLE IF NOT EXISTS audit_logs (
        id BIGINT UNSIGNED AUTO_INCREMENT PRIMARY KEY,
        actor_user_id INT UNSIGNED NULL,
        target_user_id INT UNSIGNED NULL,
        event_type VARCHAR(80) NOT NULL,
        entity_type VARCHAR(40) NOT NULL,
        entity_id BIGINT UNSIGNED NULL,
        ip_address VARCHAR(45) NOT NULL,
        details LONGTEXT NULL,
        created_at TIMESTAMP NOT NULL DEFAULT CURRENT_TIMESTAMP,
        INDEX idx_audit_created_at (created_at),
        INDEX idx_audit_actor_user_id (actor_user_id),
        INDEX idx_audit_target_user_id (target_user_id),
        INDEX idx_audit_event_type (event_type)
    ) ENGINE=InnoDB;

    CREATE TABLE IF NOT EXISTS user_mfa (
        id INT UNSIGNED AUTO_INCREMENT PRIMARY KEY,
        user_id INT UNSIGNED NOT NULL,
        totp_secret VARCHAR(64) NOT NULL,
        is_enabled TINYINT(1) NOT NULL DEFAULT 0,
        confirmed_at DATETIME NULL,
        created_at TIMESTAMP NOT NULL DEFAULT CURRENT_TIMESTAMP,
        updated_at TIMESTAMP NOT NULL DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP,
        CONSTRAINT fk_user_mfa_user FOREIGN KEY (user_id) REFERENCES users(id)
            ON DELETE CASCADE
            ON UPDATE CASCADE,
        CONSTRAINT uq_user_mfa_user UNIQUE (user_id)
    ) ENGINE=InnoDB;

    CREATE TABLE IF NOT EXISTS login_challenges (
        id BIGINT UNSIGNED AUTO_INCREMENT PRIMARY KEY,
        user_id INT UNSIGNED NOT NULL,
        challenge_hash CHAR(64) NOT NULL,
        expires_at DATETIME NOT NULL,
        used TINYINT(1) NOT NULL DEFAULT 0,
        used_at DATETIME NULL,
        ip_address VARCHAR(45) NOT NULL,
        created_at TIMESTAMP NOT NULL DEFAULT CURRENT_TIMESTAMP,
        CONSTRAINT fk_login_challenges_user FOREIGN KEY (user_id) REFERENCES users(id)
            ON DELETE CASCADE
            ON UPDATE CASCADE,
        CONSTRAINT uq_login_challenges_hash UNIQUE (challenge_hash)
    ) ENGINE=InnoDB;

    CREATE TABLE IF NOT EXISTS password_reset_tokens (
        id BIGINT UNSIGNED AUTO_INCREMENT PRIMARY KEY,
        user_id INT UNSIGNED NOT NULL,
        token_hash CHAR(64) NOT NULL,
        expires_at DATETIME NOT NULL,
        used TINYINT(1) NOT NULL DEFAULT 0,
        used_at DATETIME NULL,
        ip_address VARCHAR(45) NOT NULL,
        created_at TIMESTAMP NOT NULL DEFAULT CURRENT_TIMESTAMP,
        CONSTRAINT fk_password_reset_tokens_user FOREIGN KEY (user_id) REFERENCES users(id)
            ON DELETE CASCADE
            ON UPDATE CASCADE,
        CONSTRAINT uq_password_reset_tokens_hash UNIQUE (token_hash)
    ) ENGINE=InnoDB;

    CREATE INDEX idx_user_mfa_user_id ON user_mfa(user_id);
    CREATE INDEX idx_login_challenges_user_id ON login_challenges(user_id);
    CREATE INDEX idx_login_challenges_hash ON login_challenges(challenge_hash);
    CREATE INDEX idx_password_reset_tokens_user_id ON password_reset_tokens(user_id);
    CREATE INDEX idx_password_reset_tokens_hash ON password_reset_tokens(token_hash);

    CREATE INDEX idx_auth_tokens_user_id ON auth_tokens(user_id);
    CREATE INDEX idx_auth_tokens_expires_at ON auth_tokens(expires_at);
    CREATE INDEX idx_auth_tokens_revoked ON auth_tokens(revoked);
