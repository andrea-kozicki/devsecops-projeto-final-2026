apiVersion: apps/v1
kind: Deployment
metadata:
  name: tasks-service
  namespace: studyboard
  labels:
    app: tasks-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tasks-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: tasks-service
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/agent-requests-cpu: "25m"
        vault.hashicorp.com/agent-limits-cpu: "100m"
        vault.hashicorp.com/agent-requests-mem: "32Mi"
        vault.hashicorp.com/agent-limits-mem: "64Mi"
        vault.hashicorp.com/role: "studyboard-tasks"
        vault.hashicorp.com/agent-inject-secret-tasks.env: "secret/data/studyboard/tasks-service"
        vault.hashicorp.com/agent-inject-template-tasks.env: |
          {{- with secret "secret/data/studyboard/tasks-service" -}}
          export TASK_DB_USER="{{ .Data.data.TASK_DB_USER }}"
          export TASK_DB_PASS="{{ .Data.data.TASK_DB_PASS }}"
          {{- end }}
    spec:
      serviceAccountName: tasks-service-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 33
        runAsGroup: 33
        fsGroup: 33
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: tasks-service
          image: studyboard-tasks:local
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-c"]
          args:
            - . /vault/secrets/tasks.env && apache2-foreground
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: APP_ENV
              value: production
            - name: TASK_DB_HOST
              value: tasks-db
            - name: TASK_DB_PORT
              value: "3306"
            - name: TASK_DB_NAME
              value: studyboard_tasks
            - name: AUTH_SERVICE_URL
              value: http://auth-service
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 40
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 96Mi
            limits:
              cpu: 250m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
